<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Yield Prediction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

    /* Background Image */
    background-image: url("{{ url_for('static', filename='images/farming-image.jpg') }}");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f0f4ff;
            border-radius: 8px;
            text-align: center;
        }
        .result h2 {
            color: #667eea;
            font-size: 20px;
            margin-bottom: 10px;
        }
        .result p {
            font-size: 32px;
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌾 Crop Yield Prediction System</h1>
        
        <form method="POST" action="/predict">
            <div class="form-group">
                <label for="year">Year</label>
                <input type="number" id="year" name="year" required min="1990" max="2030" value="2020">
            </div>
            
            <div class="form-group">
                <label for="area">Country/Area</label>
                <input type="text" id="area" name="area" required placeholder="e.g., India">
            </div>
            
            <div class="form-group">
                <label for="item">Crop Item</label>
                <select id="item" name="item" required>
                    <option value="Maize">Maize</option>
                    <option value="Potatoes">Potatoes</option>
                    <option value="Rice, paddy">Rice, paddy</option>
                    <option value="Sorghum">Sorghum</option>
                    <option value="Soybeans">Soybeans</option>
                    <option value="Wheat">Wheat</option>
                    <option value="Cassava">Cassava</option>
                    <option value="Sweet potatoes">Sweet potatoes</option>
                    <option value="Plantains and others">Plantains and others</option>
                    <option value="Yams">Yams</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="rainfall">Average Rainfall (mm/year)</label>
                <input type="number" step="0.01" id="rainfall" name="rainfall" required placeholder="e.g., 1200.5">
            </div>
            
            <div class="form-group">
                <label for="pesticides">Pesticides (tonnes)</label>
                <input type="number" step="0.01" id="pesticides" name="pesticides" required placeholder="e.g., 150.75">
            </div>
            
            <div class="form-group">
                <label for="temp">Average Temperature (°C)</label>
                <input type="number" step="0.01" id="temp" name="temp" required placeholder="e.g., 25.5">
            </div>
            
            <button type="submit">Predict Yield</button>
        </form>
        
        {% if prediction %}
        <div class="result">
            <h2>Predicted Crop Yield</h2>
            <p>{{ prediction }} hg/ha</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
